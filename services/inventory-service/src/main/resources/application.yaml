spring:
  application:
    name: inventory-service
  artemis:
    mode: native
    broker-url: tcp://localhost:61616
    user: admin
    password: admin
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/app?currentSchema=inventory_service}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

events:
  orders:
    created:
      v1: orders.created.v1

server:
  port: 8082

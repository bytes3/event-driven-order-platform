spring:
  application:
    name: order-service
  flyway:
    enabled: true
    create-schemas: on
    default-schema: orders_service
    cleanDisabled: false
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/app?currentSchema=orders_service}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  artemis:
    mode: native
    broker-url: tcp://localhost:61616
    user: admin
    password: admin

events:
  orders:
    created:
      v1: orders.created.v1

server:
  port: 8081
